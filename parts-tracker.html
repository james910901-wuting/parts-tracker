<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機台零件查詢系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A38;
    --navy-2:#233A4C;
    --paper:#EDEEE6;
    --paper-2:#F6F6F1;
    --steel:#3D5A73;
    --steel-light:#7A8B96;
    --amber:#D4772C;
    --amber-dark:#A8591C;
    --graphite:#28333B;
    --line:#C7C9BE;
    --danger:#B5453B;
    --radius:6px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:
      linear-gradient(var(--paper) 0, var(--paper) 100%),
      repeating-linear-gradient(0deg, rgba(61,90,115,0.06) 0px, rgba(61,90,115,0.06) 1px, transparent 1px, transparent 32px),
      repeating-linear-gradient(90deg, rgba(61,90,115,0.06) 0px, rgba(61,90,115,0.06) 1px, transparent 1px, transparent 32px);
    color:var(--graphite);
    min-height:100vh;
  }
  h1,h2,h3{ font-family:'Barlow Condensed',sans-serif; letter-spacing:0.02em; margin:0; }
  .app{ max-width:920px; margin:0 auto; padding:28px 20px 80px; }

  header.topbar{
    background:var(--navy);
    color:#EDEEE6;
    margin:-28px -20px 28px;
    padding:20px 20px 16px;
    border-bottom:4px solid var(--amber);
  }
  header.topbar .titlerow{ display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  header.topbar h1{ font-size:26px; font-weight:700; text-transform:uppercase; }
  header.topbar .sub{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:#9FB4C4; }

  .toplevel-tabs{ display:flex; gap:2px; margin-top:16px; }
  .toplevel-tab{
    font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:15px; text-transform:uppercase;
    letter-spacing:0.03em; padding:8px 16px; cursor:pointer; color:#9FB4C4; border-bottom:3px solid transparent;
  }
  .toplevel-tab:hover{ color:#fff; }
  .toplevel-tab.active{ color:#fff; border-bottom-color:var(--amber); }

  .breadcrumb{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:10px; font-family:'IBM Plex Mono',monospace; font-size:12px; }
  .crumb{ background:var(--navy-2); border:1px solid #37536A; color:#C9D6DE; padding:5px 10px; border-radius:3px; cursor:pointer; }
  .crumb.active{ background:var(--amber); border-color:var(--amber-dark); color:#2A1706; font-weight:500; }
  .crumb:not(.active):hover{ border-color:var(--amber); color:#fff; }
  .crumb-arrow{ color:#5A7284; }

  .panel{ background:var(--paper-2); border:1px solid var(--line); border-radius:var(--radius); padding:20px; position:relative; }
  .panel::before, .panel::after{ content:""; position:absolute; width:14px; height:14px; border:2px solid var(--steel-light); opacity:0.5; }
  .panel::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .panel::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }

  .panel-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:12px; flex-wrap:wrap; }
  .panel-head h2{ font-size:21px; text-transform:uppercase; color:var(--navy); }
  .count-tag{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--steel); background:#E2E6DC; padding:3px 8px; border-radius:3px; }

  input[type=text], input[type=number], select, textarea{
    font-family:'Inter',sans-serif;
    border:1px solid var(--line);
    background:#fff;
    padding:9px 11px;
    border-radius:4px;
    font-size:14px;
    color:var(--graphite);
    width:100%;
  }
  textarea{ resize:vertical; font-family:'IBM Plex Mono',monospace; line-height:1.5; }
  input:focus, select:focus, textarea:focus{ outline:2px solid var(--amber); outline-offset:1px; border-color:var(--amber); }

  .search-row{ display:flex; gap:10px; margin-bottom:16px; }
  .search-row input{ flex:1; }

  button{
    font-family:'Inter',sans-serif;
    font-weight:500;
    font-size:13.5px;
    border-radius:4px;
    border:1px solid var(--steel);
    background:#fff;
    color:var(--steel);
    padding:9px 14px;
    cursor:pointer;
  }
  button:hover{ background:#eef1ec; }
  button.primary{ background:var(--amber); border-color:var(--amber-dark); color:#2A1706; }
  button.primary:hover{ background:#C4691F; }
  button.ghost{ border-color:transparent; color:var(--steel-light); padding:6px 8px; }
  button.ghost:hover{ background:#e6e8e0; color:var(--danger); }
  button.small{ padding:6px 10px; font-size:12.5px; }
  button:disabled{ opacity:0.4; cursor:not-allowed; }

  .list{ display:flex; flex-direction:column; gap:8px; }
  .card-item{
    display:flex; align-items:center; justify-content:space-between;
    background:#fff; border:1px solid var(--line); border-radius:4px;
    padding:12px 14px; cursor:pointer; transition:border-color .12s;
  }
  .card-item:hover{ border-color:var(--amber); }
  .card-item .name{ font-weight:600; font-size:15px; color:var(--navy); }
  .card-item .meta{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--steel-light); margin-top:2px; }
  .card-item .go{ color:var(--amber-dark); font-family:'IBM Plex Mono',monospace; font-size:13px; }
  .card-item-actions{ display:flex; align-items:center; gap:4px; }

  .empty{ text-align:center; padding:40px 10px; color:var(--steel-light); }
  .empty .big{ font-family:'Barlow Condensed',sans-serif; font-size:18px; color:var(--steel); margin-bottom:4px; }

  .add-form{ display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; border-top:1px dashed var(--line); padding-top:14px; }
  .add-form input{ flex:1; min-width:140px; }

  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  thead th{
    text-align:left; font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:11px;
    text-transform:uppercase; letter-spacing:0.04em; color:var(--steel); border-bottom:2px solid var(--steel);
    padding:8px 8px;
  }
  tbody td{ padding:9px 8px; border-bottom:1px solid var(--line); vertical-align:middle; }
  tbody tr:hover{ background:#F0F1EA; }
  .partno-tag{
    font-family:'IBM Plex Mono',monospace; font-size:12px; background:var(--navy); color:#EDEEE6;
    padding:3px 7px; border-radius:3px; display:inline-block;
  }
  .qty{ font-family:'IBM Plex Mono',monospace; font-weight:500; }
  td.actions{ text-align:right; white-space:nowrap; }

  .modal-bg{ position:fixed; inset:0; background:rgba(20,28,34,0.55); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; }
  .modal{ background:var(--paper-2); border:1px solid var(--line); border-radius:var(--radius); padding:22px; width:100%; max-width:420px; }
  .modal h3{ font-size:19px; text-transform:uppercase; color:var(--navy); margin-bottom:14px; }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12px; color:var(--steel); margin-bottom:4px; font-family:'IBM Plex Mono',monospace; }
  .part-modal .field label{ font-size:15px; }
  .part-modal .field input{ font-size:17px; padding:11px 12px; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }

  .toolbar{ display:flex; justify-content:flex-end; gap:8px; margin-bottom:14px; }
  .loading{ text-align:center; padding:60px 0; color:var(--steel-light); font-family:'IBM Plex Mono',monospace; }
  .notice{ font-size:12px; color:var(--steel-light); margin-top:18px; text-align:center; }

  .parts-view .panel-head h2{ font-size:24px; }
  .parts-view .count-tag{ font-size:13px; padding:4px 10px; }
  .parts-view button{ font-size:15px; padding:10px 16px; }
  .parts-view button.small{ font-size:14px; padding:8px 12px; }
  .parts-view table{ font-size:16px; }
  .parts-view thead th{ font-size:13px; padding:10px 10px; }
  .parts-view tbody td{ padding:13px 10px; }
  .parts-view .partno-tag{ font-size:14px; padding:4px 9px; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading">載入中…</div>
</div>

<script>
const STORAGE_KEYS = { customers:'ptx_customers', machines:'ptx_machines', parts:'ptx_parts' };
const SHARED = true;
const hasCloudStorage = (typeof window.storage !== 'undefined') && window.storage && typeof window.storage.get === 'function';
let usingLocalFallback = !hasCloudStorage;

const storageAdapter = {
  async get(key, shared){
    if(hasCloudStorage){
      try{ return await window.storage.get(key, shared); }
      catch(e){ return null; }
    }
    try{
      const v = window.localStorage.getItem(key);
      return v !== null ? { key, value:v, shared:!!shared } : null;
    }catch(e){ return null; }
  },
  async set(key, value, shared){
    if(hasCloudStorage){
      try{ return await window.storage.set(key, value, shared); }
      catch(e){ return null; }
    }
    try{
      window.localStorage.setItem(key, value);
      return { key, value, shared:!!shared };
    }catch(e){ return null; }
  }
};

let state = {
  loaded:false,
  customers:[],
  machines:[],
  parts:[],
  view:'customers',
  selectedCustomerId:null,
  selectedMachineId:null,
  search:'',
  modal:null,
  editId:null,
  topView:'browse',
  globalSearch:'',
  globalSearchDraft:''
};

function switchTopView(v){ state.topView=v; if(v==='search'){ } render(); }

function liveSearchInput(id, stateKey, el){
  const pos = el.selectionStart;
  state[stateKey] = el.value;
  render();
  const el2 = document.getElementById(id);
  if(el2){ el2.focus(); try{ el2.setSelectionRange(pos,pos); }catch(e){} }
}

function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

async function loadAll(){
  try{
    const c = await storageAdapter.get(STORAGE_KEYS.customers, SHARED);
    state.customers = c ? JSON.parse(c.value) : [];
  }catch(e){ state.customers = []; }
  try{
    const m = await storageAdapter.get(STORAGE_KEYS.machines, SHARED);
    state.machines = m ? JSON.parse(m.value) : [];
  }catch(e){ state.machines = []; }
  try{
    const p = await storageAdapter.get(STORAGE_KEYS.parts, SHARED);
    state.parts = p ? JSON.parse(p.value) : [];
  }catch(e){ state.parts = []; }
  state.loaded = true;
  render();
}

async function saveCustomers(){ await safeSave(STORAGE_KEYS.customers, state.customers); }
async function saveMachines(){ await safeSave(STORAGE_KEYS.machines, state.machines); }
async function saveParts(){ await safeSave(STORAGE_KEYS.parts, state.parts); }
async function safeSave(key, value){
  const result = await storageAdapter.set(key, JSON.stringify(value), SHARED);
  if(!result) console.error('儲存失敗', key);
}

function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function goCustomers(){ state.view='customers'; state.search=''; state.selectedCustomerId=null; state.selectedMachineId=null; render(); }
function goMachines(customerId){ state.view='machines'; state.search=''; state.selectedCustomerId=customerId; state.selectedMachineId=null; render(); }
function goParts(machineId){ state.view='parts'; state.selectedMachineId=machineId; render(); }

function currentCustomer(){ return state.customers.find(c=>c.id===state.selectedCustomerId); }
function currentMachine(){ return state.machines.find(m=>m.id===state.selectedMachineId); }

function render(){
  const app = document.getElementById('app');
  if(!state.loaded){ app.innerHTML = '<div class="loading">載入中…</div>'; return; }

  let breadcrumbHtml = '';
  if(state.topView==='browse'){
    breadcrumbHtml = `<div class="breadcrumb">
      <span class="crumb ${state.view==='customers'?'active':''}" onclick="goCustomers()">1．客戶</span>`;
    if(state.selectedCustomerId){
      const cust = currentCustomer();
      breadcrumbHtml += `<span class="crumb-arrow">›</span>
        <span class="crumb ${state.view==='machines'?'active':''}" onclick="goMachines('${state.selectedCustomerId}')">2．機型${cust?'　'+esc(cust.name):''}</span>`;
    }
    if(state.selectedMachineId){
      const mach = currentMachine();
      breadcrumbHtml += `<span class="crumb-arrow">›</span>
        <span class="crumb ${state.view==='parts'?'active':''}" onclick="goParts('${state.selectedMachineId}')">3．料件清單${mach?'　'+esc(mach.model):''}</span>`;
    }
    breadcrumbHtml += `</div>`;
  }

  const tabsHtml = `<div class="toplevel-tabs">
    <span class="toplevel-tab ${state.topView==='browse'?'active':''}" onclick="switchTopView('browse')">客戶瀏覽</span>
    <span class="toplevel-tab ${state.topView==='search'?'active':''}" onclick="switchTopView('search')">料號搜尋</span>
  </div>`;

  let body = '';
  if(state.topView==='search'){
    body = renderGlobalSearch();
  } else if(state.view==='customers') body = renderCustomers();
  else if(state.view==='machines') body = renderMachines();
  else body = renderParts();

  app.innerHTML = `
    <header class="topbar">
      <div class="titlerow">
        <h1>機台零件查詢系統</h1>
        <span class="sub">PARTS REGISTRY / v1</span>
      </div>
      ${tabsHtml}
      ${breadcrumbHtml}
    </header>
    ${body}
    <div class="notice">${usingLocalFallback
      ? '⚠ 目前使用本機瀏覽器儲存（此檔案未在 Claude 對話中開啟）。資料只會保存在這台電腦、這個瀏覽器裡，換電腦或清除瀏覽器資料會遺失，也無法與他人共用。'
      : '資料為共用儲存，開啟此頁面的所有人都可看到並編輯相同內容。'}</div>
  `;
  if(state.modal) renderModal();
}

// ---------- SCREEN 1: customers ----------
function renderCustomers(){
  const q = state.search.trim().toLowerCase();
  const list = state.customers.filter(c => c.name.toLowerCase().includes(q));
  return `
    <div class="panel">
      <div class="panel-head">
        <h2>搜尋客戶</h2>
        <span class="count-tag">共 ${state.customers.length} 位客戶</span>
      </div>
      <div class="search-row">
        <input type="text" id="customerSearchInput" placeholder="輸入客戶名稱關鍵字…" value="${esc(state.search)}"
          oninput="liveSearchInput('customerSearchInput','search',this)">
        <button class="primary" onclick="openModal('addCustomer')">＋ 新增客戶</button>
      </div>
      <div class="list">
        ${list.length ? list.map(c => `
          <div class="card-item" onclick="goMachines('${c.id}')">
            <div>
              <div class="name">${esc(c.name)}</div>
              <div class="meta">${countMachines(c.id)} 台機台</div>
            </div>
            <div class="card-item-actions">
              <span class="go">選擇機型 →</span>
              <button class="ghost" title="編輯客戶" onclick="event.stopPropagation(); openModal('addCustomer','${c.id}')">編輯</button>
              <button class="ghost" title="刪除客戶" onclick="event.stopPropagation(); deleteCustomer('${c.id}')">✕</button>
            </div>
          </div>
        `).join('') : `<div class="empty"><div class="big">${state.customers.length? '找不到符合的客戶' : '尚未建立客戶資料'}</div>點擊「新增客戶」開始建立資料</div>`}
      </div>
    </div>
  `;
}
function countMachines(customerId){ return state.machines.filter(m=>m.customerId===customerId).length; }

// ---------- Global part-number search ----------
function parsePartNoTokens(str){
  return [...new Set(String(str||'').split(/[\n,，\s]+/).map(s=>s.trim()).filter(Boolean))];
}

function liveGlobalSearch(el){
  const pos = el.selectionStart;
  state.globalSearchDraft = el.value;
  state.globalSearch = el.value;
  render();
  const el2 = document.getElementById('globalSearchBox');
  if(el2){ el2.focus(); try{ el2.setSelectionRange(pos,pos); }catch(e){} }
}

function renderGlobalSearch(){
  const tokens = parsePartNoTokens(state.globalSearch);
  const results = tokens.length
    ? state.parts.filter(p => tokens.some(t => (p.partNo||'').toLowerCase().includes(t.toLowerCase())))
    : [];
  const notFound = tokens.filter(t => !state.parts.some(p => (p.partNo||'').toLowerCase().includes(t.toLowerCase())));
  return `
    <div class="panel">
      <div class="panel-head">
        <h2>料號搜尋</h2>
        <span class="count-tag">跨所有客戶／機台</span>
      </div>
      <div class="field">
        <label>輸入料號（可貼上多筆，用換行、逗號或空白分隔，邊打邊搜尋）</label>
        <textarea id="globalSearchBox" rows="3" placeholder="例：&#10;P-10023&#10;P-10098, P-11002"
          oninput="liveGlobalSearch(this)">${esc(state.globalSearchDraft)}</textarea>
      </div>
      <div class="list">
        ${!tokens.length ? `<div class="empty"><div class="big">輸入料號開始搜尋</div>會列出所有客戶與機台中符合的料件</div>` :
          results.length ? results.map(p => {
            const mach = state.machines.find(m=>m.id===p.machineId);
            const cust = mach ? state.customers.find(c=>c.id===mach.customerId) : null;
            return `
            <div class="card-item" onclick="jumpToMachine('${p.machineId}')">
              <div>
                <div class="name"><span class="partno-tag">${esc(p.partNo||'—')}</span>　${esc(p.name)}</div>
                <div class="meta">${esc(cust?cust.name:'—')}　·　${esc(mach?mach.model:'—')}　·　數量 ${esc(p.qty ?? '—')}</div>
              </div>
              <span class="go">前往機台 →</span>
            </div>`;
          }).join('') : `<div class="empty"><div class="big">找不到符合的料號</div>換個關鍵字再試試</div>`}
      </div>
      ${notFound.length ? `<div class="notice" style="text-align:left; margin-top:14px;">查無資料的料號：${notFound.map(esc).join('、')}</div>` : ''}
    </div>
  `;
}

function jumpToMachine(machineId){
  const mach = state.machines.find(m=>m.id===machineId);
  if(!mach) return;
  state.topView='browse';
  state.selectedCustomerId=mach.customerId;
  state.selectedMachineId=machineId;
  state.view='parts';
  render();
}

async function deleteCustomer(id){
  if(!confirm('確定要刪除此客戶？相關機台與料件資料也會一併刪除。')) return;
  const machineIds = state.machines.filter(m=>m.customerId===id).map(m=>m.id);
  state.customers = state.customers.filter(c=>c.id!==id);
  state.machines = state.machines.filter(m=>m.customerId!==id);
  state.parts = state.parts.filter(p=>!machineIds.includes(p.machineId));
  await Promise.all([saveCustomers(), saveMachines(), saveParts()]);
  render();
}

// ---------- SCREEN 2: machines ----------
function renderMachines(){
  const cust = currentCustomer();
  if(!cust){ goCustomers(); return ''; }
  const q = state.search.trim().toLowerCase();
  const list = state.machines.filter(m => m.customerId===cust.id &&
    (m.model.toLowerCase().includes(q) || (m.label||'').toLowerCase().includes(q)));
  return `
    <div class="panel">
      <div class="panel-head">
        <h2>選擇機型 — ${esc(cust.name)}</h2>
        <span class="count-tag">共 ${countMachines(cust.id)} 台</span>
      </div>
      <div class="search-row">
        <input type="text" id="machineSearchInput" placeholder="搜尋機型或編號…" value="${esc(state.search)}"
          oninput="liveSearchInput('machineSearchInput','search',this)">
        <button class="primary" onclick="openModal('addMachine')">＋ 新增機台</button>
      </div>
      <div class="list">
        ${list.length ? list.map(m => `
          <div class="card-item" onclick="goParts('${m.id}')">
            <div>
              <div class="name">${esc(m.model)}</div>
              <div class="meta">${esc(m.label||'—')}　·　${countParts(m.id)} 項料件</div>
            </div>
            <div class="card-item-actions">
              <span class="go">查看料件 →</span>
              <button class="ghost" title="編輯機台" onclick="event.stopPropagation(); openModal('addMachine','${m.id}')">編輯</button>
              <button class="ghost" title="刪除機台" onclick="event.stopPropagation(); deleteMachine('${m.id}')">✕</button>
            </div>
          </div>
        `).join('') : `<div class="empty"><div class="big">${countMachines(cust.id)? '找不到符合的機型' : '此客戶尚未建立機台'}</div>點擊「新增機台」開始建立資料</div>`}
      </div>
    </div>
  `;
}
function countParts(machineId){ return state.parts.filter(p=>p.machineId===machineId).length; }

async function deleteMachine(id){
  if(!confirm('確定要刪除此機台？相關料件資料也會一併刪除。')) return;
  state.machines = state.machines.filter(m=>m.id!==id);
  state.parts = state.parts.filter(p=>p.machineId!==id);
  await Promise.all([saveMachines(), saveParts()]);
  render();
}

// ---------- SCREEN 3: parts ----------
function renderParts(){
  const mach = currentMachine();
  if(!mach){ goCustomers(); return ''; }
  const cust = state.customers.find(c=>c.id===mach.customerId);
  const list = state.parts.filter(p=>p.machineId===mach.id);
  return `
    <div class="panel parts-view">
      <div class="panel-head">
        <h2>料件清單 — ${esc(mach.model)}</h2>
        <span class="count-tag">共 ${list.length} 項料件</span>
      </div>
      <div class="toolbar">
        <button class="primary" onclick="openModal('addPart')">＋ 新增料件</button>
      </div>
      ${list.length ? `
      <table>
        <thead>
          <tr><th>料號</th><th>名稱</th><th>數量</th><th>備註</th><th></th></tr>
        </thead>
        <tbody>
          ${list.map(p => `
            <tr>
              <td><span class="partno-tag">${esc(p.partNo||'—')}</span></td>
              <td>${esc(p.name)}</td>
              <td class="qty">${esc(p.qty ?? '—')}</td>
              <td>${esc(p.note||'')}</td>
              <td class="actions">
                <button class="small ghost" onclick="openModal('addPart','${p.id}')">編輯</button>
                <button class="small ghost" onclick="deletePart('${p.id}')">刪除</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      ` : `<div class="empty"><div class="big">此機台尚未建立料件資料</div>點擊「新增料件」開始建立料件清單</div>`}
    </div>
  `;
}

async function deletePart(id){
  if(!confirm('確定要刪除此筆料件？')) return;
  state.parts = state.parts.filter(p=>p.id!==id);
  await saveParts();
  render();
}

// ---------- Modals ----------
function openModal(type, editId){ state.modal = type; state.editId = editId || null; render(); }
function closeModal(){ state.modal = null; state.editId = null; render(); }

function renderModal(){
  const app = document.getElementById('app');
  let html = '';
  if(state.modal==='addCustomer'){
    const editing = state.editId ? state.customers.find(c=>c.id===state.editId) : null;
    html = `
      <div class="modal-bg" onclick="if(event.target===this) closeModal()">
        <div class="modal">
          <h3>${editing?'編輯客戶':'新增客戶'}</h3>
          <div class="field"><label>客戶名稱</label><input type="text" id="m_name" placeholder="例：台灣精密工業" value="${editing?esc(editing.name):''}"></div>
          <div class="modal-actions">
            <button onclick="closeModal()">取消</button>
            <button class="primary" onclick="submitCustomer()">儲存</button>
          </div>
        </div>
      </div>`;
  } else if(state.modal==='addMachine'){
    const editing = state.editId ? state.machines.find(m=>m.id===state.editId) : null;
    html = `
      <div class="modal-bg" onclick="if(event.target===this) closeModal()">
        <div class="modal">
          <h3>${editing?'編輯機台':'新增機台'}</h3>
          <div class="field"><label>機型 / 型號</label><input type="text" id="m_model" placeholder="例：CNC-500X" value="${editing?esc(editing.model):''}"></div>
          <div class="field"><label>標籤 / 說明（選填）</label><input type="text" id="m_label" placeholder="例：一廠 2 號機" value="${editing?esc(editing.label||''):''}"></div>
          <div class="modal-actions">
            <button onclick="closeModal()">取消</button>
            <button class="primary" onclick="submitMachine()">儲存</button>
          </div>
        </div>
      </div>`;
  } else if(state.modal==='addPart'){
    const editing = state.editId ? state.parts.find(p=>p.id===state.editId) : null;
    html = `
      <div class="modal-bg" onclick="if(event.target===this) closeModal()">
        <div class="modal part-modal">
          <h3>${editing?'編輯料件':'新增料件'}</h3>
          <div class="field"><label>料號</label>
            <input type="text" id="p_no" list="partNoList" placeholder="輸入或從清單選擇既有料號" oninput="onPartNoPicked()" autocomplete="off" value="${editing?esc(editing.partNo||''):''}">
            <datalist id="partNoList">${getDistinctPartNos().map(no=>`<option value="${esc(no)}">`).join('')}</datalist>
          </div>
          <div class="field"><label>名稱</label><input type="text" id="p_name" placeholder="例：軸承" value="${editing?esc(editing.name||''):''}"></div>
          <div class="field"><label>數量</label><input type="number" id="p_qty" placeholder="1" value="${editing?esc(editing.qty??''):''}"></div>
          <div class="field"><label>備註</label><input type="text" id="p_note" placeholder="選填" value="${editing?esc(editing.note||''):''}"></div>
          <div class="modal-actions">
            <button onclick="closeModal()">取消</button>
            <button class="primary" onclick="submitPart()">儲存</button>
          </div>
        </div>
      </div>`;
  }
  app.insertAdjacentHTML('beforeend', html);
  const firstInput = app.querySelector('.modal input');
  if(firstInput) firstInput.focus();
}

async function submitCustomer(){
  const name = document.getElementById('m_name').value.trim();
  if(!name){ alert('請輸入客戶名稱'); return; }
  if(state.editId){
    const c = state.customers.find(c=>c.id===state.editId);
    if(c) c.name = name;
  } else {
    state.customers.push({ id: uid('cust'), name });
  }
  await saveCustomers();
  closeModal();
}

async function submitMachine(){
  const model = document.getElementById('m_model').value.trim();
  const label = document.getElementById('m_label').value.trim();
  if(!model){ alert('請輸入機型 / 型號'); return; }
  if(state.editId){
    const m = state.machines.find(m=>m.id===state.editId);
    if(m){ m.model = model; m.label = label; }
  } else {
    state.machines.push({ id: uid('mach'), customerId: state.selectedCustomerId, model, label });
  }
  await saveMachines();
  closeModal();
}

async function submitPart(){
  const partNo = document.getElementById('p_no').value.trim();
  const name = document.getElementById('p_name').value.trim();
  const qty = document.getElementById('p_qty').value.trim();
  const note = document.getElementById('p_note').value.trim();
  if(!name){ alert('請輸入料件名稱'); return; }
  if(state.editId){
    const p = state.parts.find(p=>p.id===state.editId);
    if(p){ p.partNo = partNo; p.name = name; p.qty = qty; p.note = note; }
  } else {
    state.parts.push({ id: uid('part'), machineId: state.selectedMachineId, partNo, name, qty, note });
  }
  await saveParts();
  closeModal();
}

function getDistinctPartNos(){
  const nos = state.parts.map(p=>p.partNo).filter(Boolean);
  return [...new Set(nos)].sort((a,b)=>a.localeCompare(b));
}

function findLastByPartNo(partNo){
  const matches = state.parts.filter(p => p.partNo && p.partNo.toLowerCase() === partNo.toLowerCase());
  return matches.length ? matches[matches.length-1] : null;
}

function onPartNoPicked(){
  const val = document.getElementById('p_no').value.trim();
  const match = findLastByPartNo(val);
  if(match){
    document.getElementById('p_name').value = match.name || '';
    document.getElementById('p_qty').value = match.qty || '';
  }
}

loadAll();
</script>
</body>
</html>
